name: Deploy example_flutter to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: pub get
        working-directory: example_flutter
        run: flutter pub get

      - name: Build web
        working-directory: example_flutter
        run: >
          flutter build web
          --release
          --base-href /dartcoin/
          --dart-define=WS_BRIDGE_PROTOCOL=wss
          --dart-define=WS_BRIDGE_HOST=prx.dartcoin.org
          --dart-define=WS_BRIDGE_PORT=443
          --dart-define=FIXED_PEER_HOST=193.30.123.70
          --dart-define=FIXED_PEER_PORT=48333
          --dart-define=FIXED_NETWORK=testnet4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: example_flutter/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
